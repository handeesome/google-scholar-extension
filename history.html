<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Google Scholar Tracker - History</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      #notionControls {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 12px;
      }
      #avatar {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        display: none;
      }
      #loginStatus {
        font-weight: bold;
      }
      #lastSync {
        font-size: 12px;
        color: #666;
      }
      .spinner {
        border: 3px solid #eee;
        border-top: 3px solid #333;
        border-radius: 50%;
        width: 14px;
        height: 14px;
        animation: spin 0.8s linear infinite;
        display: inline-block;
      }
      @keyframes spin {
        100% {
          transform: rotate(360deg);
        }
      }
      .logged-in {
        color: #2ea44f;
      }
      .logged-out {
        color: #d32f2f;
      }
    </style>
  </head>
  <body>
    <h2>Visited Papers</h2>

    <div id="notionControls">
      <img id="avatar" />
      <span id="loginStatus" class="logged-out">Not logged in</span>

      <button id="loginBtn">Login</button>
      <button id="logoutBtn" style="display: none">Logout</button>

      <button id="syncBtn" disabled title="Sync history with Notion"
        >Sync with Notion</button
      >

      <button id="setDbBtn" style="display: none">Reconnect Database</button>
      <span id="lastSync">Last Sync: Never</span>
    </div>

    <div id="controls">
      <button id="deleteSelected">Delete Selected</button>
      <button id="clearAll">Clear All</button>
    </div>

    <table id="historyTable">
      <thead>
        <tr>
          <th></th>
          <th>Title</th>
          <th>Authors / Source</th>
          <th>Visits</th>
          <th>Visited Time</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <script src="history.js"></script>
  </body>
</html>
